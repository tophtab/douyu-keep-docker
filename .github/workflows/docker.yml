name: Docker Build & Push

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['V*.*.*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Build TypeScript
        run: |
          npm ci --ignore-scripts
          npx tsc -p tsconfig.docker.json
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Read Docker version tag
        id: version
        run: |
          node -e "const version=require('./package.json').version; const parts=version.split('.'); if (parts.length < 2) throw new Error('Invalid package.json version'); console.log('minor=' + parts[0] + '.' + parts[1]);" >> \"$GITHUB_OUTPUT\"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/douyu-keep
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.minor }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
