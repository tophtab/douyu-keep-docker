name: Docker Build & Push

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['V*.*.*', 'v*.*.*']
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  IMAGE_NAME: tophtab/douyu-keep-just-works
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'master' }}

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: docker-publish-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build Docker runtime
        run: npm run build:docker

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          set -euo pipefail

          IMAGE="${IMAGE_NAME}"
          DEFAULT_BRANCH="${DEFAULT_BRANCH:-master}"
          PUSH="false"
          VERSION="ci"
          CHANNEL="ci"
          TAGS=()

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^[vV]([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            else
              echo "Release tags must use Vx.y.z or vx.y.z, for example V2.1.0." >&2
              exit 1
            fi
            TAGS=("${IMAGE}:${VERSION}" "${IMAGE}:latest")
            CHANNEL="release"
            PUSH="true"
          elif [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            BASE_VERSION="$(node -p "require('./package.json').version")"
            if [[ ! "${BASE_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "package.json version must be numeric semver x.y.z, got: ${BASE_VERSION}" >&2
              exit 1
            fi

            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            BASE_PATCH="${BASH_REMATCH[3]}"
            LINE="${MAJOR}.${MINOR}"
            export LINE
            MAX_PATCH="$(node <<'NODE'
          async function main() {
            const image = process.env.IMAGE_NAME
            const line = process.env.LINE

            if (!image || !line) {
              console.error('IMAGE_NAME and LINE are required')
              process.exit(1)
            }

            const [namespace, repository] = image.split('/')
            if (!namespace || !repository) {
              console.error(`IMAGE_NAME must be namespace/repository, got: ${image}`)
              process.exit(1)
            }

            const escapedLine = line.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            const tagPattern = new RegExp(`^${escapedLine}\\.(\\d+)$`)
            let url = `https://hub.docker.com/v2/repositories/${encodeURIComponent(namespace)}/${encodeURIComponent(repository)}/tags?page_size=100&name=${encodeURIComponent(`${line}.`)}`
            let maxPatch = ''

            while (url) {
              const response = await fetch(url, {
                headers: {
                  'User-Agent': 'douyu-keep-just-works-docker-workflow',
                },
              })

              if (!response.ok) {
                console.error(`Docker Hub tag query failed: ${response.status} ${response.statusText}`)
                process.exit(1)
              }

              const data = await response.json()
              for (const tag of data.results ?? []) {
                const match = tag.name?.match(tagPattern)
                if (match) {
                  const patch = Number.parseInt(match[1], 10)
                  if (Number.isSafeInteger(patch) && (maxPatch === '' || patch > maxPatch)) {
                    maxPatch = patch
                  }
                }
              }

              url = data.next
            }

            process.stdout.write(String(maxPatch))
          }

          main().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          NODE
            )"

            NEXT_PATCH="${BASE_PATCH}"
            if [[ -n "${MAX_PATCH}" && "${MAX_PATCH}" -ge "${BASE_PATCH}" ]]; then
              NEXT_PATCH="$((MAX_PATCH + 1))"
            fi

            VERSION="${LINE}.${NEXT_PATCH}"
            TAGS=("${IMAGE}:${VERSION}" "${IMAGE}:latest")
            CHANNEL="auto-patch"
            PUSH="true"
          fi

          {
            echo "push=${PUSH}"
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=douyu-keep-just-works"
            echo "org.opencontainers.image.description=Douyu fan medal Docker WebUI"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${VERSION}"
            echo "org.opencontainers.image.ref.name=${GITHUB_REF_NAME}"
            echo "org.opencontainers.image.channel=${CHANNEL}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.docker-tags.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.docker-tags.outputs.push }}
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: ${{ steps.docker-tags.outputs.labels }}
          provenance: ${{ steps.docker-tags.outputs.push }}
          sbom: ${{ steps.docker-tags.outputs.push }}
